name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.AZURE_REGISTRY }}         # e.g. myregistry.azurecr.io
  RESOURCE_GROUP: employee-engagement-rg
  API_APP_NAME: engagement-api
  UI_APP_NAME: engagement-ui

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check employee_engagement/ tests/

      - name: Test
        run: pytest tests/ -v --cov=employee_engagement
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  build-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      api_tag: ${{ steps.meta_api.outputs.version }}
      ui_tag: ${{ steps.meta_ui.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build & push API image
        id: meta_api
        run: |
          TAG=${{ env.REGISTRY }}/engagement-api:${{ github.sha }}
          docker build -f docker/Dockerfile.api -t $TAG .
          docker push $TAG
          echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & push UI image
        id: meta_ui
        run: |
          TAG=${{ env.REGISTRY }}/engagement-ui:${{ github.sha }}
          docker build -f docker/Dockerfile.streamlit -t $TAG .
          docker push $TAG

  deploy:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.API_APP_NAME }}
          imageToDeploy: ${{ env.REGISTRY }}/engagement-api:${{ github.sha }}
          environmentVariables: |
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy UI to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.UI_APP_NAME }}
          imageToDeploy: ${{ env.REGISTRY }}/engagement-ui:${{ github.sha }}
